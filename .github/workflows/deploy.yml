name: Deploy to Hostinger Subdomain
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install xlsx jsbarcode @zxing/browser @zxing/library lucide-react @tanstack/react-query @supabase/supabase-js framer-motion clsx tailwind-merge --save

      - name: Build project
        run: |
          sed -i "/lovable-tagger/d" vite.config.ts
          npm run build
        env:
          VITE_SUPABASE_URL: "https://vznzdkpcroccuklfjxac.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6bnpka3Bjcm9jY3VrbGZqeGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTQ2MjQsImV4cCI6MjA5MzAzMDYyNH0.xvTxabYlNW6gq_BbQsCj2UZJLXboC85-P0B78z1dlOA"

      - name: Prepare Files for Deployment
        run: |
          # التأكد من وجود الملفات ونسخها للمجلد النهائي
          cp public/manifest.json dist/ || echo "manifest.json not found"
          cp public/sw.js dist/ || echo "sw.js not found"
          cp public/000.png dist/ || echo "000.png not found"
          
          # إنشاء ملف .htaccess
          echo '<IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>' > dist/.htaccess
          
          # إصلاح مسارات الأصول في index.html
          sed -i "s|/assets/|assets/|g" dist/index.html
          
          # عرض قائمة الملفات للتأكد (ستظهر في سجلات GitHub )
          ls -R dist/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/aldaahia/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
