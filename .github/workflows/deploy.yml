name: Deploy to Hostinger Subdomain
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install xlsx jsbarcode @zxing/browser @zxing/library lucide-react @tanstack/react-query @supabase/supabase-js framer-motion clsx tailwind-merge --save

      - name: Build project
        run: |
          sed -i "/lovable-tagger/d" vite.config.ts
          npm run build
        env:
          VITE_SUPABASE_URL: "https://vznzdkpcroccuklfjxac.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6bnpka3Bjcm9jY3VrbGZqeGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTQ2MjQsImV4cCI6MjA5MzAzMDYyNH0.xvTxabYlNW6gq_BbQsCj2UZJLXboC85-P0B78z1dlOA"

      - name: Prepare Files for Deployment
        run: |
          cp public/manifest.json dist/manifest.json || echo "manifest.json missing"
          cp public/sw.js dist/sw.js || echo "sw.js missing"
          cp public/000.png dist/000.png || echo "000.png missing"
          
          echo '<IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^(manifest\.json|sw\.js|000\.png ) - [L]
            RewriteCond %{REQUEST_FILENAME} -f
            RewriteRule ^ - [L]
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>' > dist/.htaccess
          
          sed -i "s|/assets/|assets/|g" dist/index.html

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/aldaahia/
          protocol: ftp
          port: 21
          # إعدادات إضافية لحل مشكلة الـ Timeout
          timeout: 90000
          log-level: verbose
