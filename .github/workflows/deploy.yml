name: Deploy to Hostinger Subdomain
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install xlsx jsbarcode @zxing/browser @zxing/library lucide-react @tanstack/react-query @supabase/supabase-js framer-motion clsx tailwind-merge --save

      - name: Build project
        run: |
          sed -i "/lovable-tagger/d" vite.config.ts
          npm run build
        env:
          VITE_SUPABASE_URL: "https://vznzdkpcroccuklfjxac.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6bnpka3Bjcm9jY3VrbGZqeGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTQ2MjQsImV4cCI6MjA5MzAzMDYyNH0.xvTxabYlNW6gq_BbQsCj2UZJLXboC85-P0B78z1dlOA"

      - name: Prepare Files
        run: |
          cp public/manifest.json dist/manifest.json || true
          cp public/sw.js dist/sw.js || true
          cp public/000.png dist/000.png || true
          
          echo 'RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . index.html [L]' > dist/.htaccess
          
          sed -i "s|/assets/|assets/|g" dist/index.html

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # التعديل هنا: المسار الصحيح بالنسبة لحساب الـ FTP
          server-dir: domains/almalkieducational.com/public_html/aldaahia/
          protocol: ftp
          port: 21
          timeout: 90000
